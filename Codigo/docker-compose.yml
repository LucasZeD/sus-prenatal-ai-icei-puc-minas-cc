# Subir/rebuild a partir da pasta **Codigo/** (onde está este arquivo):
#   docker compose up -d --build
# Depois de mudar o código do backend, use `--build` para o container `prenatal_backend` receber o `dist/` novo.

name: prenatal-digital

services:
  db:
    image: postgres:16-alpine
    container_name: prenatal_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-sus_prenatal}
    volumes:
      - prenatal_pg_data:/var/lib/postgresql/data
    networks:
      - data-nw
    restart: unless-stopped
    # Apenas loopback no host (Prisma Studio / backend rodando fora do Compose)
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prenatal_backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${BACKEND_PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sus_prenatal}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      MCP_SERVER_URL: ${MCP_SERVER_URL:-}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in Codigo/.env (RF14)}
      JWT_EXPIRES_SEC: ${JWT_EXPIRES_SEC:-28800}
    ports:
      - "${BACKEND_PUBLISH_PORT:-3000}:3000"
    networks:
      - backend-nw
      - data-nw
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
    container_name: prenatal_frontend
    ports:
      - "${FRONTEND_PUBLISH_PORT:-5173}:80"
    networks:
      - frontend-nw
    depends_on:
      - backend
    restart: unless-stopped

  # --- Placeholders IA (perfil opcional): ancorar na data-nw ---
  # ollama:
  #   profiles: [ai]
  #   image: ollama/ollama:latest
  #   networks: [data-nw]
  #   volumes: [ollama_data:/root/.ollama]
  #
  # faster-whisper:
  #   profiles: [ai]
  #   image: fedirz/faster-whisper-server:latest
  #   networks: [data-nw]

networks:
  frontend-nw:
    driver: bridge
  backend-nw:
    driver: bridge
  data-nw:
    driver: bridge

volumes:
  prenatal_pg_data:
  # ollama_data:
